name: Publicar Villa Calypso en GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Preparar archivos de producción
        shell: bash
        run: |
          mkdir -p _site
          cp -R assets _site/assets
          cp index.html 404.html robots.txt sitemap.xml site.webmanifest CNAME .nojekyll _site/

      - name: Empaquetar sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
